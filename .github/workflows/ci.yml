name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and test
        run: ./gradlew clean build

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Verify Node.js bridge
        run: node minimal-mcp.js --help
